name: Build inference image

on:
  push:
    branches: [main]
    paths: [terraform/container/**]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  build-and-push:
    runs-on: [self-hosted, docker-heavy]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: qwen25-14b-inference
          TAG: ${{ github.sha }}
          BASE_IMAGE: vllm/vllm-openai:v0.11.0
        run: |
          docker build \
            --platform=linux/amd64 \
            --build-arg BASE_IMAGE=$BASE_IMAGE \
            -t $REGISTRY/$REPO:$TAG \
            -f terraform/container/Dockerfile \
            terraform/container
          docker push $REGISTRY/$REPO:$TAG
